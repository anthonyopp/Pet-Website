<!-- public/mobile-warning.html -->
<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>仅限PC端访问</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        margin: 0;
        background-color: #f0f0f0;
        text-align: center;
      }
      .content {
        max-width: 500px;
        margin: 20px;
      }
      h1 {
        color: #333;
      }
      p {
        color: #666;
      }
      a {
        display: inline-block;
        padding: 10px 20px;
        margin-top: 20px;
        background-color: #007bff;
        color: #fff;
        text-decoration: none;
        border-radius: 4px;
      }
      a:hover {
        background-color: #0056b3;
      }
    </style>
  </head>
  <body>
    <div class="content">
      <h1>抱歉，您的设备不支持访问该网站</h1>
      <p>此网站仅适用于PC端访问，您可以在PC端设备上访问本网站。</p>
      <a href="https://www.example.com">返回首页</a>
    </div>
  </body>
</html>
